<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>停车接客 - 架构设计图</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
  }
  .container {
    background: #16213e;
    border-radius: 16px;
    padding: 32px 24px;
  }
  svg text.title {
    fill: #e0e0e0;
    font-size: 22px;
    font-weight: bold;
  }
</style>
</head>
<body>
<div class="container">
<svg width="1100" height="820" viewBox="0 0 1100 820" xmlns="http://www.w3.org/2000/svg">

  <!-- 背景 -->
  <rect width="1100" height="820" rx="12" fill="#16213e"/>

  <!-- 标题 -->
  <text x="550" y="36" text-anchor="middle" class="title">停车接客 游戏架构设计图</text>

  <!-- ============ 第一层：入口层 ============ -->
  <rect x="30" y="60" width="1040" height="80" rx="8" fill="#0f3460" stroke="#e94560" stroke-width="1.5"/>
  <text x="50" y="90" fill="#e94560" font-size="14" font-weight="bold">入口层 Entry</text>

  <!-- game.js -->
  <rect x="50" y="100" width="130" height="32" rx="6" fill="#1a1a2e" stroke="#e94560" stroke-width="1"/>
  <text x="115" y="121" text-anchor="middle" fill="#ccc" font-size="13">game.js</text>

  <!-- game.json -->
  <rect x="200" y="100" width="130" height="32" rx="6" fill="#1a1a2e" stroke="#e94560" stroke-width="1"/>
  <text x="265" y="121" text-anchor="middle" fill="#ccc" font-size="13">game.json</text>

  <!-- project.config.json -->
  <rect x="350" y="100" width="160" height="32" rx="6" fill="#1a1a2e" stroke="#e94560" stroke-width="1"/>
  <text x="430" y="121" text-anchor="middle" fill="#ccc" font-size="13">project.config.json</text>

  <!-- ============ 第二层：启动引导层 ============ -->
  <rect x="30" y="165" width="1040" height="80" rx="8" fill="#0f3460" stroke="#533483" stroke-width="1.5"/>
  <text x="50" y="195" fill="#a855f7" font-size="14" font-weight="bold">启动引导层 Boot</text>

  <rect x="50" y="205" width="130" height="32" rx="6" fill="#1a1a2e" stroke="#a855f7" stroke-width="1"/>
  <text x="115" y="226" text-anchor="middle" fill="#ccc" font-size="13">main.js</text>

  <rect x="200" y="205" width="130" height="32" rx="6" fill="#1a1a2e" stroke="#a855f7" stroke-width="1"/>
  <text x="265" y="226" text-anchor="middle" fill="#ccc" font-size="13">databus.js</text>

  <rect x="350" y="205" width="130" height="32" rx="6" fill="#1a1a2e" stroke="#a855f7" stroke-width="1"/>
  <text x="415" y="226" text-anchor="middle" fill="#ccc" font-size="13">render.js</text>

  <!-- ============ 第三层：核心引擎层 ============ -->
  <rect x="30" y="270" width="1040" height="80" rx="8" fill="#0f3460" stroke="#e2b93b" stroke-width="1.5"/>
  <text x="50" y="300" fill="#fbbf24" font-size="14" font-weight="bold">核心引擎层 core/</text>

  <rect x="50" y="310" width="180" height="32" rx="6" fill="#1a1a2e" stroke="#fbbf24" stroke-width="1"/>
  <text x="140" y="331" text-anchor="middle" fill="#ccc" font-size="13">GameEngine.js</text>

  <rect x="260" y="310" width="180" height="32" rx="6" fill="#1a1a2e" stroke="#fbbf24" stroke-width="1"/>
  <text x="350" y="331" text-anchor="middle" fill="#ccc" font-size="13">StateMachine.js</text>

  <rect x="470" y="310" width="180" height="32" rx="6" fill="#1a1a2e" stroke="#fbbf24" stroke-width="1"/>
  <text x="560" y="331" text-anchor="middle" fill="#ccc" font-size="13">InputManager.js</text>

  <!-- ============ 第四层：系统/实体/AI/UI 层 ============ -->
  <rect x="30" y="380" width="1040" height="175" rx="8" fill="#0f3460" stroke="#4ade80" stroke-width="1.5"/>
  <text x="50" y="410" fill="#4ade80" font-size="14" font-weight="bold">业务层 — 实体 / 系统 / AI / UI / 数据</text>

  <!-- entities -->
  <text x="55" y="445" fill="#38bdf8" font-size="12" font-weight="bold">entities/</text>
  <rect x="55" y="455" width="120" height="30" rx="5" fill="#1a1a2e" stroke="#38bdf8" stroke-width="1"/>
  <text x="115" y="475" text-anchor="middle" fill="#ccc" font-size="12">Car.js</text>
  <rect x="185" y="455" width="130" height="30" rx="5" fill="#1a1a2e" stroke="#38bdf8" stroke-width="1"/>
  <text x="250" y="475" text-anchor="middle" fill="#ccc" font-size="12">PickupSlot.js</text>
  <rect x="325" y="455" width="130" height="30" rx="5" fill="#1a1a2e" stroke="#38bdf8" stroke-width="1"/>
  <text x="390" y="475" text-anchor="middle" fill="#ccc" font-size="12">Passenger.js</text>
  <rect x="55" y="493" width="120" height="30" rx="5" fill="#1a1a2e" stroke="#38bdf8" stroke-width="1"/>
  <text x="115" y="513" text-anchor="middle" fill="#ccc" font-size="12">Grid.js</text>

  <!-- systems -->
  <text x="490" y="445" fill="#f97316" font-size="12" font-weight="bold">systems/</text>
  <rect x="490" y="455" width="140" height="30" rx="5" fill="#1a1a2e" stroke="#f97316" stroke-width="1"/>
  <text x="560" y="475" text-anchor="middle" fill="#ccc" font-size="12">MoveSystem.js</text>
  <rect x="640" y="455" width="140" height="30" rx="5" fill="#1a1a2e" stroke="#f97316" stroke-width="1"/>
  <text x="710" y="475" text-anchor="middle" fill="#ccc" font-size="12">PickupSystem.js</text>
  <rect x="490" y="493" width="140" height="30" rx="5" fill="#1a1a2e" stroke="#f97316" stroke-width="1"/>
  <text x="560" y="513" text-anchor="middle" fill="#ccc" font-size="12">WinLoseSystem.js</text>

  <!-- ai -->
  <text x="810" y="445" fill="#e879f9" font-size="12" font-weight="bold">ai/</text>
  <rect x="810" y="455" width="130" height="30" rx="5" fill="#1a1a2e" stroke="#e879f9" stroke-width="1"/>
  <text x="875" y="475" text-anchor="middle" fill="#ccc" font-size="12">HintSolver.js</text>

  <!-- ui -->
  <text x="810" y="495" fill="#fb923c" font-size="12" font-weight="bold">ui/</text>
  <rect x="810" y="505" width="120" height="28" rx="5" fill="#1a1a2e" stroke="#fb923c" stroke-width="1"/>
  <text x="870" y="524" text-anchor="middle" fill="#ccc" font-size="11">Button.js</text>
  <rect x="938" y="505" width="120" height="28" rx="5" fill="#1a1a2e" stroke="#fb923c" stroke-width="1"/>
  <text x="998" y="524" text-anchor="middle" fill="#ccc" font-size="11">HUD.js</text>
  <rect x="810" y="538" width="120" height="28" rx="5" fill="#1a1a2e" stroke="#fb923c" stroke-width="1"/>
  <text x="870" y="557" text-anchor="middle" fill="#ccc" font-size="11">PickupZoneUI.js</text>
  <rect x="938" y="538" width="120" height="28" rx="5" fill="#1a1a2e" stroke="#fb923c" stroke-width="1"/>
  <text x="998" y="557" text-anchor="middle" fill="#ccc" font-size="11">Popup.js</text>

  <!-- levels + utils -->
  <text x="490" y="530" fill="#fbbf24" font-size="12" font-weight="bold">levels/</text>
  <rect x="490" y="540" width="100" height="26" rx="5" fill="#1a1a2e" stroke="#fbbf24" stroke-width="1"/>
  <text x="540" y="558" text-anchor="middle" fill="#ccc" font-size="11">level-1.js</text>
  <rect x="598" y="540" width="100" height="26" rx="5" fill="#1a1a2e" stroke="#fbbf24" stroke-width="1"/>
  <text x="648" y="558" text-anchor="middle" fill="#ccc" font-size="11">level-2.js</text>
  <rect x="706" y="540" width="100" height="26" rx="5" fill="#1a1a2e" stroke="#fbbf24" stroke-width="1"/>
  <text x="756" y="558" text-anchor="middle" fill="#ccc" font-size="11">level-3.js</text>

  <text x="185" y="530" fill="#a78bfa" font-size="12" font-weight="bold">utils/</text>
  <rect x="185" y="540" width="110" height="26" rx="5" fill="#1a1a2e" stroke="#a78bfa" stroke-width="1"/>
  <text x="240" y="558" text-anchor="middle" fill="#ccc" font-size="11">colors.js</text>

  <!-- ============ 数据流箭头 ============ -->

  <!-- 入口到引导层 -->
  <line x1="115" y1="132" x2="115" y2="205" stroke="#e94560" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="265" y1="132" x2="265" y2="205" stroke="#e94560" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- 引导层到核心引擎 -->
  <line x1="265" y1="237" x2="350" y2="310" stroke="#a855f7" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="115" y1="237" x2="140" y2="310" stroke="#a855f7" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="415" y1="237" x2="560" y2="310" stroke="#a855f7" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- 核心引擎到业务层 -->
  <line x1="140" y1="342" x2="140" y2="455" stroke="#fbbf24" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="350" y1="342" x2="350" y2="475" stroke="#fbbf24" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="560" y1="342" x2="560" y2="455" stroke="#fbbf24" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- ============ 右侧图例 ============ -->
  <rect x="940" y="68" width="130" height="20" rx="4" fill="#e94560" opacity="0.15"/>
  <text x="950" y="82" fill="#e94560" font-size="10">—— 入口层</text>
  <rect x="940" y="94" width="130" height="20" rx="4" fill="#a855f7" opacity="0.15"/>
  <text x="950" y="108" fill="#a855f7" font-size="10">—— 引导层</text>
  <rect x="940" y="120" width="130" height="20" rx="4" fill="#fbbf24" opacity="0.15"/>
  <text x="950" y="134" fill="#fbbf24" font-size="10">—— 引擎层</text>
  <rect x="940" y="146" width="130" height="20" rx="4" fill="#4ade80" opacity="0.15"/>
  <text x="950" y="160" fill="#4ade80" font-size="10">—— 业务层</text>

  <!-- 数据流向说明 -->
  <rect x="55" y="590" width="990" height="220" rx="8" fill="#0f3460" opacity="0.6" stroke="#6b7280" stroke-width="1"/>
  <text x="75" y="618" fill="#9ca3af" font-size="14" font-weight="bold">数据流向</text>

  <!-- data flow boxes -->
  <rect x="75" y="635" width="220" height="100" rx="8" fill="#1a1a2e" stroke="#e94560" stroke-width="1.5"/>
  <text x="185" y="660" text-anchor="middle" fill="#e94560" font-size="13" font-weight="bold">用户输入</text>
  <text x="185" y="682" text-anchor="middle" fill="#9ca3af" font-size="11">触摸事件</text>
  <text x="185" y="700" text-anchor="middle" fill="#9ca3af" font-size="11">↓</text>
  <text x="185" y="718" text-anchor="middle" fill="#9ca3af" font-size="11">InputManager 坐标转换</text>

  <!-- 箭头 -->
  <line x1="295" y1="685" x2="340" y2="685" stroke="#9ca3af" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="345" y="635" width="220" height="100" rx="8" fill="#1a1a2e" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="455" y="660" text-anchor="middle" fill="#fbbf24" font-size="13" font-weight="bold">GameEngine</text>
  <text x="455" y="682" text-anchor="middle" fill="#9ca3af" font-size="11">主循环 update/render</text>
  <text x="455" y="700" text-anchor="middle" fill="#9ca3af" font-size="11">↓</text>
  <text x="455" y="718" text-anchor="middle" fill="#9ca3af" font-size="11">调度 Systems + UI</text>

  <line x1="565" y1="685" x2="610" y2="685" stroke="#9ca3af" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="615" y="635" width="200" height="100" rx="8" fill="#1a1a2e" stroke="#4ade80" stroke-width="1.5"/>
  <text x="715" y="660" text-anchor="middle" fill="#4ade80" font-size="13" font-weight="bold">DataBus（数据中心）</text>
  <text x="715" y="682" text-anchor="middle" fill="#9ca3af" font-size="11">cars / slots / passengers</text>
  <text x="715" y="700" text-anchor="middle" fill="#9ca3af" font-size="11">gameState / currentLevel</text>
  <text x="715" y="718" text-anchor="middle" fill="#9ca3af" font-size="11">hintCarId</text>

  <line x1="815" y1="685" x2="860" y2="685" stroke="#9ca3af" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="865" y="635" width="165" height="100" rx="8" fill="#1a1a2e" stroke="#e879f9" stroke-width="1.5"/>
  <text x="947" y="660" text-anchor="middle" fill="#e879f9" font-size="13" font-weight="bold">Canvas 渲染</text>
  <text x="947" y="682" text-anchor="middle" fill="#9ca3af" font-size="11">UI 组件绘制</text>
  <text x="947" y="700" text-anchor="middle" fill="#9ca3af" font-size="11">实体渲染</text>
  <text x="947" y="718" text-anchor="middle" fill="#9ca3af" font-size="11">动画帧输出</text>

  <!-- 双向箭头 databus 与 systems -->
  <path d="M 715 635 L 715 620 L 455 620 L 455 635" fill="none" stroke="#6b7280" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="585" y="616" text-anchor="middle" fill="#6b7280" font-size="10">读写</text>

  <!-- HintSolver 标注 -->
  <path d="M 875 455 L 875 440 L 715 440 L 715 635" fill="none" stroke="#e879f9" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="795" y="436" text-anchor="middle" fill="#e879f9" font-size="10">只读 DataBus</text>

  <!-- 箭头标记 -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 Z" fill="#9ca3af"/>
    </marker>
  </defs>

</svg>
</div>
</body>
</html>
