<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>推猪消除 — 关卡管理后台</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a1a; color: #e0e0e0; min-height: 100vh; }
  .header { background: linear-gradient(135deg, #1a1a3e 0%, #0f3460 100%); padding: 20px 32px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
  .header h1 { font-size: 22px; color: #FFD700; }
  .url-bar { display: flex; gap: 8px; align-items: center; }
  .url-bar input { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); border-radius: 6px; color: #fff; padding: 8px 12px; font-size: 13px; width: 420px; font-family: monospace; }
  .url-bar button { background: #4CAF50; color: #fff; border: none; border-radius: 6px; padding: 8px 16px; font-size: 13px; cursor: pointer; font-weight: 600; transition: background .2s; white-space: nowrap; }
  .url-bar button:hover { background: #45a049; }
  .stats { display: flex; gap: 24px; padding: 16px 32px; background: rgba(255,255,255,0.03); border-bottom: 1px solid rgba(255,255,255,0.06); flex-wrap: wrap; }
  .stat { display: flex; align-items: center; gap: 6px; }
  .stat .value { font-size: 20px; font-weight: 700; color: #FFD700; }
  .stat .label { font-size: 12px; color: rgba(255,255,255,0.5); }
  .toolbar { padding: 16px 32px; display: flex; gap: 10px; flex-wrap: wrap; }
  .toolbar button { background: rgba(255,255,255,0.08); color: #ccc; border: 1px solid rgba(255,255,255,0.12); border-radius: 6px; padding: 8px 16px; font-size: 13px; cursor: pointer; transition: all .2s; }
  .toolbar button:hover { background: rgba(255,255,255,0.15); color: #fff; }
  .toolbar button.danger { border-color: rgba(255,80,80,0.3); color: #ff6b6b; }
  .toolbar button.danger:hover { background: rgba(255,80,80,0.15); }

  table { width: 100%; border-collapse: collapse; margin: 0 32px; width: calc(100% - 64px); }
  th { text-align: left; padding: 12px 14px; font-size: 11px; text-transform: uppercase; letter-spacing: .5px; color: rgba(255,255,255,0.4); border-bottom: 2px solid rgba(255,255,255,0.06); }
  td { padding: 10px 14px; font-size: 13px; border-bottom: 1px solid rgba(255,255,255,0.04); }
  tr:hover td { background: rgba(255,255,255,0.03); }
  .download-btn { background: #2196F3; color: #fff; border: none; border-radius: 4px; padding: 5px 14px; font-size: 12px; cursor: pointer; transition: background .2s; }
  .download-btn:hover { background: #1976D2; }
  .copy-btn { background: transparent; color: rgba(255,255,255,0.5); border: 1px solid rgba(255,255,255,0.15); border-radius: 4px; padding: 5px 10px; font-size: 11px; cursor: pointer; margin-left: 6px; transition: all .2s; }
  .copy-btn:hover { color: #fff; border-color: rgba(255,255,255,0.3); }
  .delete-btn { background: rgba(244,67,54,0.15); color: #f44336; border: 1px solid rgba(244,67,54,0.25); border-radius: 4px; padding: 5px 12px; font-size: 11px; cursor: pointer; margin-left: 6px; transition: all .2s; }
  .delete-btn:hover { background: rgba(244,67,54,0.3); border-color: rgba(244,67,54,0.5); }
  .pig-badge { display: inline-block; background: rgba(255,152,0,0.2); color: #FF9800; border-radius: 10px; padding: 2px 8px; font-size: 11px; font-weight: 600; }
  .version-badge { display: inline-block; background: rgba(76,175,80,0.15); color: #4CAF50; border-radius: 10px; padding: 2px 8px; font-size: 11px; font-weight: 600; margin-left: 6px; }
  .ready-draft { display: inline-block; background: rgba(158,158,158,0.2); color: #9E9E9E; border-radius: 10px; padding: 2px 8px; font-size: 11px; font-weight: 600; }
  .ready-publish { display: inline-block; background: rgba(233,30,99,0.15); color: #E91E63; border-radius: 10px; padding: 2px 8px; font-size: 11px; font-weight: 600; }
  .loading, .empty, .error { text-align: center; padding: 60px 20px; }
  .loading { color: rgba(255,255,255,0.4); }
  .empty { color: rgba(255,255,255,0.3); }
  .error { color: #ff6b6b; }
  .toast { position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%); background: #333; color: #fff; padding: 10px 24px; border-radius: 8px; font-size: 13px; animation: toastIn .3s ease; z-index: 999; }
  @keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(10px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
  .help-note { margin: 24px 32px; padding: 14px 20px; background: rgba(255,215,0,0.06); border: 1px solid rgba(255,215,0,0.15); border-radius: 8px; font-size: 12px; color: rgba(255,255,255,0.5); line-height: 1.7; }
  .help-note code { background: rgba(255,255,255,0.08); padding: 1px 5px; border-radius: 3px; font-size: 11px; }
</style>
</head>
<body>

<div class="header">
  <h1>🎮 推猪消除 · 关卡管理后台</h1>
  <div class="url-bar">
    <input id="apiUrl" type="text" placeholder="HTTP 云函数地址" />
    <button onclick="loadLevels()">刷新列表</button>
  </div>
</div>

<div class="stats">
  <div class="stat"><span class="value" id="totalCount">-</span><span class="label">总关卡</span></div>
  <div class="stat"><span class="value" id="totalPigs">-</span><span class="label">总猪数</span></div>
</div>

<div class="toolbar">
  <button onclick="loadLevels()">🔄 刷新</button>
  <button id="downloadAllBtn" class="danger" onclick="downloadAll()">📥 批量下载全部</button>
</div>

<div id="content">
  <div class="loading">输入 HTTP 云函数地址后点击"刷新列表"</div>
</div>

<div class="help-note" id="helpNote">
  <strong>📋 配置步骤：</strong><br>
  1. 在微信开发者工具中，右键 <code>cloudfunctions/httpLevels</code> → 上传并部署<br>
  2. 打开微信开发者工具 → 云开发控制台 → 云函数 → <code>httpLevels</code> → 添加 HTTP 触发路径 <code>/</code><br>
  3. HTTP 访问地址已预填，直接点击「刷新列表」即可<br>
  4. 点击"刷新列表"加载云端关卡<br><br>
  <strong>💡 下载的 JSON 文件放到项目目录：</strong><code>project.config.json</code> 同级新建 <code>levels/</code> 文件夹
</div>

<script>
const DEFAULT_URL = 'https://cloud1-4gmoyu9g16089510.service.tcloudbase.com';

const apiInput = document.getElementById('apiUrl');
const content = document.getElementById('content');
const helpNote = document.getElementById('helpNote');
let currentData = [];

// 初始化：尝试从 localStorage 恢复上次的 URL
const savedUrl = localStorage.getItem('levelAdminUrl');
apiInput.value = savedUrl || DEFAULT_URL;

function getApiBase() {
  return apiInput.value.trim();
}

function toast(msg) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2000);
}

async function apiCall(params) {
  const base = getApiBase();
  if (!base) {
    content.innerHTML = '<div class="error">请先输入 HTTP 云函数地址</div>';
    return null;
  }
  localStorage.setItem('levelAdminUrl', base);

  const url = base + (base.includes('?') ? '&' : '?') + params;
  try {
    const res = await fetch(url);
    const contentType = res.headers.get('content-type') || '';
    if (contentType.includes('application/json')) {
      return await res.json();
    }
    // download action 返回原始 JSON
    return await res.text();
  } catch (e) {
    content.innerHTML = `<div class="error">请求失败: ${e.message}<br><small>请确认 HTTP 触发已配置且地址正确</small></div>`;
    return null;
  }
}

async function loadLevels() {
  content.innerHTML = '<div class="loading">加载中...</div>';
  helpNote.style.display = 'none';

  const res = await apiCall('action=list');
  if (!res) return;

  if (res.code !== 0) {
    content.innerHTML = `<div class="error">错误: ${res.msg}</div>`;
    return;
  }

  currentData = res.data || [];
  renderTable(currentData);

  document.getElementById('totalCount').textContent = currentData.length;
  const totalPigs = currentData.reduce((s, l) => s + (l.pigCount || 0), 0);
  document.getElementById('totalPigs').textContent = totalPigs;
}

function renderTable(data) {
  if (!data || data.length === 0) {
    content.innerHTML = '<div class="empty">云端暂无关卡</div>';
    return;
  }

  const rows = data.map(l => `
    <tr>
      <td style="color:#FFD700;font-weight:600">${esc(l.name)}</td>
      <td style="color:rgba(255,255,255,0.4);font-family:monospace;font-size:11px">${esc(l.author)}</td>
      <td><span class="pig-badge">${l.pigCount} 只猪</span></td>
      <td><span class="version-badge">v${l.version}</span></td>
      <td>${(l.ready === 1) ? '<span class="ready-publish">已发布</span>' : '<span class="ready-draft">设计中</span>'}</td>
      <td style="color:rgba(255,255,255,0.35);font-size:11px">${esc(l.updatedAt)}</td>
      <td>
        <button class="download-btn" onclick="downloadOne('${esc(l.name)}', '${esc(l.id)}')">下载 JSON</button>
        <button class="copy-btn" onclick="copyJson('${esc(l.name)}', '${esc(l.id)}')">复制内容</button>
        <button class="delete-btn" onclick="deleteLevel('${esc(l.name)}', '${esc(l.id)}')">删除</button>
      </td>
    </tr>
  `).join('');

  content.innerHTML = `
    <table>
      <thead>
        <tr>
          <th>名称</th>
          <th>作者</th>
          <th>猪数</th>
          <th>版本</th>
          <th>状态</th>
          <th>更新时间</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>
  `;
}

async function deleteLevel(name, id) {
  if (!confirm(`确定删除关卡"${name}"吗？此操作不可恢复`)) return;

  const base = getApiBase();
  const url = `${base}?action=delete&id=${encodeURIComponent(id)}`;
  try {
    const res = await fetch(url);
    const data = await res.json();
    if (data.code === 0) {
      toast(`已删除: ${name}`);
      loadLevels();
    } else {
      toast(`删除失败: ${data.msg}`);
    }
  } catch (e) {
    toast('删除失败: ' + e.message);
  }
}

async function downloadOne(name, id) {
  const base = getApiBase();
  const url = `${base}?action=download&id=${encodeURIComponent(id)}`;
  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const jsonText = await res.text();
    triggerDownload(jsonText, name + '.json');
    toast(`已下载: ${name}.json`);
  } catch (e) {
    toast('下载失败: ' + e.message);
  }
}

async function copyJson(name, id) {
  const base = getApiBase();
  const url = `${base}?action=download&id=${encodeURIComponent(id)}`;
  try {
    const res = await fetch(url);
    const text = await res.text();
    await navigator.clipboard.writeText(text);
    toast(`已复制: ${name}.json (${(text.length/1024).toFixed(1)}KB)`);
  } catch (e) {
    // 降级：用 textarea
    const textarea = document.createElement('textarea');
    textarea.value = await (await fetch(url)).text();
    document.body.appendChild(textarea);
    textarea.select();
    document.execCommand('copy');
    textarea.remove();
    toast(`已复制: ${name}.json`);
  }
}

async function downloadAll() {
  if (currentData.length === 0) {
    toast('没有可下载的关卡');
    return;
  }
  toast(`正在下载 ${currentData.length} 个关卡...`);
  for (const l of currentData) {
    try {
      const base = getApiBase();
      const url = `${base}?action=download&id=${encodeURIComponent(l.id)}`;
      const res = await fetch(url);
      const text = await res.text();
      triggerDownload(text, l.name + '.json');
      // 小延迟避免浏览器阻止批量下载
      await sleep(300);
    } catch (e) {
      console.warn(`下载 ${l.name} 失败:`, e);
    }
  }
  toast(`批量下载完成`);
}

function triggerDownload(text, filename) {
  const blob = new Blob([text], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  URL.revokeObjectURL(a.href);
}

function sleep(ms) {
  return new Promise(r => setTimeout(r, ms));
}

function esc(s) {
  if (!s) return '';
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

// 回车键刷新
apiInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') loadLevels();
});
</script>
</body>
</html>
