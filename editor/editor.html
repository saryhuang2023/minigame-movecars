<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小猪推推乐 - 关卡编辑器</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
  background: #e8e6dd; color: #333; height: 100vh;
  display: flex; flex-direction: column; overflow: hidden;
}

.toolbar {
  display: flex; align-items: center; gap: 8px; padding: 8px 16px;
  background: #fff; border-bottom: 1px solid #e0e0e0; flex-shrink: 0;
}
.toolbar .version {
  font-size: 11px; color: #aaa; font-family: monospace; margin-right: 8px;
  border: 1px solid #ddd; border-radius: 4px; padding: 1px 6px; line-height: 1.6;
}
.toolbar .title { font-size: 16px; font-weight: 500; margin-right: 16px; }
.toolbar button {
  padding: 6px 14px; border: 1px solid #ccc; border-radius: 6px;
  font-size: 13px; cursor: pointer; background: #f5f5f5; font-family: inherit;
}
.toolbar button:hover { background: #e8e8e8; }
.toolbar button.primary { background: #4CAF50; color: #fff; border-color: #4CAF50; }
.toolbar button.primary:hover { background: #43A047; }
.toolbar button.danger { background: #f44336; color: #fff; border-color: #f44336; }
.toolbar button.danger:hover { background: #e53935; }
.toolbar button.accent { background: #2196F3; color: #fff; border-color: #2196F3; }
.toolbar button.accent:hover { background: #1E88E5; }
.toolbar .mode-label {
  margin-left: auto; font-size: 13px; padding: 4px 10px;
  border-radius: 4px; font-weight: 500;
}
.toolbar .mode-label.edit { background: #E3F2FD; color: #1565C0; }
.toolbar .mode-label.preview { background: #FFF3E0; color: #E65100; }
.toolbar .sep { width: 1px; height: 24px; background: #ddd; }

.main { display: flex; flex: 1; overflow: hidden; }

.panel-left {
  width: 220px; background: #fff; border-right: 1px solid #e0e0e0;
  padding: 16px; overflow-y: auto; flex-shrink: 0;
}
.panel-left h3 { font-size: 14px; font-weight: 500; margin-bottom: 12px; color: #555; }
.param-row { display: flex; align-items: center; margin-bottom: 8px; }
.param-row label { font-size: 12px; width: 56px; color: #777; flex-shrink: 0; }
.param-row input {
  flex: 1; padding: 4px 8px; border: 1px solid #d0d0d0; border-radius: 4px;
  font-size: 12px; font-family: inherit; text-align: center;
}
.param-row input:focus { outline: none; border-color: #2196F3; }
.param-row .unit { font-size: 11px; color: #999; margin-left: 4px; width: 16px; }
.phone-size-select { margin-top: 12px; }
.phone-size-select select {
  width: 100%; padding: 4px 8px; border: 1px solid #d0d0d0;
  border-radius: 4px; font-size: 12px; font-family: inherit;
}
.info-row { font-size: 11px; color: #999; margin-top: 4px; }

.grid-ctl { margin-bottom: 8px; }
.grid-row {
  display: flex; align-items: center; gap: 6px; margin-bottom: 6px;
}
.grid-label { font-size: 12px; color: #777; width: 20px; }
.grid-btn {
  width: 28px; height: 28px; border: 1px solid #ccc; border-radius: 5px;
  font-size: 16px; line-height: 26px; cursor: pointer; background: #f5f5f5;
  font-family: inherit; text-align: center; padding: 0;
}
.grid-btn:hover { background: #e8e8e8; }
.grid-val {
  font-size: 18px; font-weight: 600; min-width: 24px; text-align: center; color: #333;
}
.tiny-btn {
  padding: 1px 6px; border: 1px solid #ccc; border-radius: 3px;
  font-size: 10px; cursor: pointer; background: #f5f5f5; font-family: inherit;
}
.tiny-btn:hover { background: #e8e8e8; }

.canvas-resize-handle {
  position: absolute; bottom: -8px; left: 0; right: 0; height: 12px;
  cursor: ns-resize; background: transparent; z-index: 10;
}
.canvas-resize-handle::after {
  content: ''; position: absolute; bottom: 2px; left: 10%; right: 10%;
  height: 2px; background: rgba(255,255,255,0.3); border-radius: 1px;
}
.canvas-resize-handle:hover::after { background: rgba(33,150,243,0.7); height: 3px; }

.center {
  flex: 1; display: flex; align-items: center; justify-content: center;
  padding: 16px; background: #e8e6dd; overflow: auto;
}
.phone-frame {
  border-radius: 24px; background: #1a1a2e;
  box-shadow: 0 8px 32px rgba(0,0,0,0.2);
  overflow: hidden; flex-shrink: 0; position: relative;
}
.phone-frame canvas { display: block; }
.phone-frame .hint {
  position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%);
  font-size: 11px; color: rgba(255,255,255,0.5); pointer-events: none;
}

.panel-right {
  width: 220px; background: #fff; border-left: 1px solid #e0e0e0;
  padding: 16px; overflow-y: auto; flex-shrink: 0;
}
.panel-right h3 { font-size: 14px; font-weight: 500; margin-bottom: 12px; color: #555; }

.pig-editor { margin-top: 8px; }
.btn-row { display: flex; gap: 6px; margin-top: 8px; }
.btn-row button {
  flex: 1; padding: 5px 8px; border: 1px solid #ccc; border-radius: 4px;
  font-size: 11px; cursor: pointer; font-family: inherit; background: #f5f5f5;
}
.btn-row button:hover { background: #e8e8e8; }
.btn-row button.warn { border-color: #f44336; color: #f44336; }
.btn-row button.warn:hover { background: #ffebee; }

.level-section { margin-top: 8px; }
.level-list { max-height: 260px; overflow-y: auto; }
.level-item {
  display: flex; align-items: center; padding: 5px 8px; margin-bottom: 2px;
  border-radius: 5px; cursor: pointer; font-size: 11px; gap: 4px;
  border: 1px solid transparent; transition: background 0.15s;
}
.level-item:hover { background: #f5f5f5; }
.level-item.active { border-color: #4CAF50; background: #E8F5E9; }
.level-item .lv-name {
  flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 500;
}
.level-item .lv-info { color: #999; font-size: 10px; flex-shrink: 0; }
.level-item .lv-dirty { color: #f44336; font-size: 9px; }
.level-item .lv-save {
  flex-shrink: 0; padding: 2px 6px; border: 1px solid #4CAF50; border-radius: 3px;
  background: #E8F5E9; color: #2E7D32; font-size: 9px; cursor: pointer; font-family: inherit;
  display: none;
}
.level-item.active .lv-save { display: inline-block; }
.level-item .lv-save:hover { background: #C8E6C9; }
.level-item .lv-publish {
  flex-shrink: 0; padding: 2px 6px; border: 1px solid #FF9800; border-radius: 3px;
  background: #FFF3E0; color: #E65100; font-size: 9px; cursor: pointer; font-family: inherit;
  display: none;
}
.level-item.active .lv-publish { display: inline-block; }
.level-item .lv-publish:hover { background: #FFE0B2; }

.lv-add {
  display: flex; align-items: center; justify-content: center;
  padding: 4px 8px; margin-top: 4px; cursor: pointer;
  border: 1px dashed #ccc; border-radius: 5px;
  color: #999; font-size: 16px; font-weight: 300;
  transition: all 0.15s;
}
.lv-add:hover { border-color: #4CAF50; color: #4CAF50; background: #E8F5E9; }

.toast {
  position: fixed; top: 60px; left: 50%; transform: translateX(-50%);
  background: #333; color: #fff; padding: 8px 20px; border-radius: 6px;
  font-size: 13px; pointer-events: none; opacity: 0; transition: opacity 0.3s;
  z-index: 100;
}
.toast.show { opacity: 1; }

canvas { cursor: crosshair; }
</style>
</head>
<body>

<div class="toolbar">
  <span class="version" id="verDisplay">v2</span>
  <span class="title">小猪推推乐 - 关卡编辑器</span>
  <span class="sep"></span>
  <button id="btnMode" class="accent" onclick="toggleMode()">关卡试玩</button>
  <span id="modeLabel" class="mode-label edit">编辑模式</span>
</div>

<div class="main">
  <div class="panel-left">
    <h3>棋盘</h3>
    <div class="grid-ctl">
      <div class="grid-row">
        <span class="grid-label">列</span>
        <button class="grid-btn" onclick="adjCols(-1)">−</button>
        <span class="grid-val" id="colsVal">5</span>
        <button class="grid-btn" onclick="adjCols(1)">+</button>
      </div>
      <div class="grid-row">
        <span class="grid-label">行</span>
        <button class="grid-btn" onclick="adjRows(-1)">−</button>
        <span class="grid-val" id="rowsVal">5</span>
        <button class="grid-btn" onclick="adjRows(1)">+</button>
      </div>
    </div>
    <div class="info-row" style="margin-top:8px;">
      间距倍率 <b id="gapRatioVal">1.5</b>
      <span style="margin-left:4px;">
        <button class="tiny-btn" onclick="adjGapRatio(-0.1)">−</button>
        <button class="tiny-btn" onclick="adjGapRatio(0.1)">+</button>
      </span>
    </div>
    <div class="info-row">直径 <b id="diameterVal">—</b> px</div>
    <div class="info-row">棋盘 <b id="boardSizeVal">—</b></div>
    <hr style="margin:12px 0; border:none; border-top:1px solid #e0e0e0;">
    <div class="level-section">
      <div class="level-list" id="levelListContainer"></div>
    </div>
  </div>

  <div class="center">
    <div class="phone-frame" id="phoneFrame">
      <canvas id="gameCanvas"></canvas>
      <div class="hint" id="canvasHint">点击空圆洞放置小猪 | 拖拽头部可调整</div>
    </div>
  </div>

  <div class="panel-right">
    <div class="pig-editor" id="pigEditor" style="display:none;">
      <h4>选中小猪</h4>
      <div id="pigEditorInfo" style="font-size:12px;color:#666;line-height:1.8;"></div>
      <div class="btn-row" style="margin-top:8px;">
        <button class="warn" onclick="deleteSelectedPig()">删除</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ============================================================
// GLOBAL STATE
// ============================================================
const PHONE_SIZES = {
  '440x956': { w: 440, h: 956, label: 'iPhone 17 Pro Max (440×956)' },
  '426x950': { w: 426, h: 950, label: 'Huawei Pura 80 Ultra (426×950)' }
};

let phoneW = 440;
// phoneH is computed: phoneW × heightRatio
let board = { cols: 3, rows: 5, heightRatio: 1.2, cellGapRatio: 1.5 };
let pigs = [];
let nextPigId = 0;
let mode = 'edit';
let selectedPigId = null;
let dragState = null;
let backupPigs = null;
let animations = [];
let ghostAnimations = []; // edit-mode push preview ghosts

let holes = [];
let holeOccupiedBy = [];
let pigInstances = [];
let flashingPigs = {};        // { pigId: startTime } — preview mode bump flash

// Level management
let levelList = [];           // [{ name, fileName, data, fileHandle, isDirty }]
let currentLevelIdx = -1;
const LEVELS_DIR = 'levels';
const PIG_COLOR = '#FFD700';

// Publish handle  
let publishDirHandle = null;  // FileSystemDirectoryHandle for game levels
let levelsDirHandle = null;   // FileSystemDirectoryHandle for editor levels/

// ============================================================
// BOARD COMPUTATIONS
// ============================================================
function getBoardDerived() {
  const cols = board.cols, rows = board.rows;
  const phoneH = Math.round(phoneW * board.heightRatio);
  const hSpacing = Math.round(phoneW / cols);
  const vSpacing = Math.round(phoneH / rows);
  const diameter = Math.round(hSpacing / (1 + board.cellGapRatio));
  return { cols, rows, diameter, hSpacing, vSpacing, phoneH };
}

function getTotalHoles() {
  const d = getBoardDerived();
  return d.rows * d.cols + (d.rows - 1) * (d.cols - 1);
}

function getBoardSize() {
  const d = getBoardDerived();
  return { width: phoneW, height: d.phoneH };
}

function getBoardOffset() {
  return { x: 0, y: 0 };
}

function computeHoles() {
  holes = [];
  const d = getBoardDerived();
  const hStep = d.hSpacing;
  const vStep = d.vSpacing;
  const marginX = hStep / 2;
  const marginY = vStep / 2;

  // Primary holes (even rows)
  for (let r = 0; r < d.rows; r++) {
    for (let c = 0; c < d.cols; c++) {
      holes.push({ x: marginX + c * hStep, y: marginY + r * vStep, type: 'grid', row: r, col: c });
    }
  }
  // Diagonal holes (between rows, offset half step)
  for (let r = 0; r < d.rows - 1; r++) {
    for (let c = 0; c < d.cols - 1; c++) {
      holes.push({
        x: marginX + hStep / 2 + c * hStep,
        y: marginY + vStep / 2 + r * vStep,
        type: 'diag', row: r, col: c
      });
    }
  }
}

// ============================================================
// OVERLAP CALCULATION (1/4 rule)
// ============================================================
function cellOverlapsHole(cellX, cellY, holeX, holeY) {
  const cellSize = board.diameter;
  const holeRadius = board.diameter / 2;
  const maxDist = holeRadius + cellSize * Math.SQRT2 / 2;
  const dx = cellX - holeX;
  const dy = cellY - holeY;
  if (dx * dx + dy * dy > maxDist * maxDist) return false;

  const samples = 20;
  const step = cellSize / samples;
  const startX = cellX - cellSize / 2 + step / 2;
  const startY = cellY - cellSize / 2 + step / 2;
  let count = 0;
  const r2 = holeRadius * holeRadius;

  for (let i = 0; i < samples; i++) {
    const px = startX + i * step;
    for (let j = 0; j < samples; j++) {
      const py = startY + j * step;
      const ddx = px - holeX;
      const ddy = py - holeY;
      if (ddx * ddx + ddy * ddy <= r2) count++;
    }
  }

  return count / (samples * samples) >= Math.PI / 16;
}

// ============================================================
// PIG COMPUTATIONS
// ============================================================
function getPigCells(tailIndex, length, angle) {
  if (tailIndex < 0 || tailIndex >= holes.length) return [];
  const tail = holes[tailIndex];
  const cells = [];
  const rad = angle * Math.PI / 180;
  const dirX = Math.cos(rad);
  const dirY = -Math.sin(rad);

  for (let i = 0; i < length; i++) {
    cells.push({
      x: tail.x + i * board.diameter * dirX,
      y: tail.y + i * board.diameter * dirY
    });
  }
  return cells;
}

function getPigOccupiedHoles(tailIndex, length, angle) {
  const cells = getPigCells(tailIndex, length, angle);
  if (cells.length === 0) return { occupied: [], headIndex: -1 };
  const occupied = [];
  const headCell = cells[cells.length - 1];
  let headHoleIndex = -1;

  for (let hi = 0; hi < holes.length; hi++) {
    for (const cell of cells) {
      if (cellOverlapsHole(cell.x, cell.y, holes[hi].x, holes[hi].y)) {
        occupied.push(hi);
        if (cell === headCell) headHoleIndex = hi;
        break;
      }
    }
  }
  return { occupied, headHoleIndex };
}

function isPlacementValid(tailIndex, length, angle, excludePigId) {
  const { occupied, headHoleIndex } = getPigOccupiedHoles(tailIndex, length, angle);
  if (headHoleIndex < 0) return { valid: false, reason: '头部未占孔' };
  for (const hi of occupied) {
    if (holeOccupiedBy[hi] >= 0 && holeOccupiedBy[hi] !== excludePigId) {
      return { valid: false, reason: '孔已被占用' };
    }
  }
  return { valid: true, occupied };
}

function rebuildOccupancy() {
  holeOccupiedBy = new Array(holes.length).fill(-1);
  pigInstances = [];

  for (const pig of pigs) {
    const cells = getPigCells(pig.tailIndex, pig.length, pig.angle);
    const { occupied } = getPigOccupiedHoles(pig.tailIndex, pig.length, pig.angle);

    for (const hi of occupied) {
      holeOccupiedBy[hi] = pig.id;
    }

    pigInstances.push({
      id: pig.id,
      tailIndex: pig.tailIndex,
      length: pig.length,
      angle: pig.angle,
      cells,
      occupiedHoles: occupied
    });
  }
}

// ============================================================
// FIND ELEMENTS AT POINT
// ============================================================
function getHoleAtPoint(canvasX, canvasY, margin) {
  const offset = getBoardOffset();
  const r = board.diameter / 2 + (margin || 0);
  for (let i = 0; i < holes.length; i++) {
    const hx = offset.x + holes[i].x;
    const hy = offset.y + holes[i].y;
    const dx = canvasX - hx;
    const dy = canvasY - hy;
    if (dx * dx + dy * dy <= r * r) return i;
  }
  return -1;
}

function getPigAtPoint(canvasX, canvasY) {
  const offset = getBoardOffset();
  for (const inst of pigInstances) {
    for (const cell of inst.cells) {
      const cx = offset.x + cell.x;
      const cy = offset.y + cell.y;
      const half = board.diameter / 2;
      if (canvasX >= cx - half && canvasX <= cx + half &&
          canvasY >= cy - half && canvasY <= cy + half) {
        return inst.id;
      }
    }
  }
  return -1;
}

function getHeadAtPoint(canvasX, canvasY) {
  const offset = getBoardOffset();
  for (const inst of pigInstances) {
    const headCell = inst.cells[inst.cells.length - 1];
    const cx = offset.x + headCell.x;
    const cy = offset.y + headCell.y;
    const half = board.diameter / 2 + 3;
    if (canvasX >= cx - half && canvasX <= cx + half &&
        canvasY >= cy - half && canvasY <= cy + half) {
      return inst.id;
    }
  }
  return -1;
}

// ============================================================
// CANVAS RENDERING
// ============================================================
function render() {
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  const offset = getBoardOffset();
  const r = board.diameter / 2;

  ctx.save();
  ctx.translate(offset.x, offset.y);

  // Draw holes
  for (let i = 0; i < holes.length; i++) {
    const h = holes[i];
    const occ = holeOccupiedBy[i];

    ctx.beginPath();
    ctx.arc(h.x, h.y, r, 0, Math.PI * 2);

    if (occ >= 0) {
      ctx.fillStyle = '#FFB6C1';
    } else {
      ctx.fillStyle = 'rgba(255,255,255,0.15)';
      ctx.strokeStyle = 'rgba(255,255,255,0.3)';
      ctx.lineWidth = 0.5;
      ctx.stroke();
    }
    ctx.fill();
  }

  // Draw pigs
  const animOffsets = {};
  for (const a of animations) {
    animOffsets[a.pigId] = { dx: a.currentDx, dy: a.currentDy };
  }

  for (const inst of pigInstances) {
    const off = animOffsets[inst.id] || { dx: 0, dy: 0 };
    const rad = inst.angle * Math.PI / 180;
    const dirX = Math.cos(rad);
    const dirY = -Math.sin(rad);
    const tail = holes[inst.tailIndex];
    const totalLen = inst.length * board.diameter;
    const centerX = tail.x + (inst.length - 1) / 2 * board.diameter * dirX + off.dx;
    const centerY = tail.y + (inst.length - 1) / 2 * board.diameter * dirY + off.dy;

    // Check flash state
    let flashAlpha = 1;
    if (flashingPigs[inst.id]) {
      const elapsed = performance.now() - flashingPigs[inst.id];
      const FLASH_DURATION = 500;
      if (elapsed > FLASH_DURATION) {
        delete flashingPigs[inst.id];
      } else {
        // Oscillate: 2 quick blinks
        const t = elapsed / FLASH_DURATION;
        flashAlpha = 0.25 + 0.75 * Math.abs(Math.sin(t * Math.PI * 4));
      }
    }

    ctx.save();
    ctx.translate(centerX, centerY);
    ctx.rotate(-rad);

    ctx.globalAlpha = 0.35 * flashAlpha;
    ctx.fillStyle = '#FFD700';
    roundRect(ctx, -totalLen / 2, -board.diameter / 2, totalLen, board.diameter, 6);
    ctx.fill();
    ctx.globalAlpha = flashAlpha;

    ctx.strokeStyle = '#FFD700';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // Eye on head side
    ctx.globalAlpha = flashAlpha;
    const eyeX = totalLen / 2 - board.diameter * 0.35;
    const eyeY = -board.diameter * 0.15;
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(eyeX, eyeY, board.diameter * 0.22, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#333';
    ctx.beginPath();
    ctx.arc(eyeX + 1, eyeY, board.diameter * 0.11, 0, Math.PI * 2);
    ctx.fill();

    ctx.globalAlpha = 1;
      ctx.restore();
  }

  // Draw ghost push animations (edit mode — real pig stays, ghost slides out)
  for (const ga of ghostAnimations) {
    const inst = pigInstances.find(p => p.id === ga.pigId);
    if (!inst) continue;
    const rad = inst.angle * Math.PI / 180;
    const dirX = Math.cos(rad);
    const dirY = -Math.sin(rad);
    const tail = holes[inst.tailIndex];
    const totalLen = inst.length * board.diameter;
    const ghostCX = tail.x + (inst.length - 1) / 2 * board.diameter * dirX + ga.currentDx;
    const ghostCY = tail.y + (inst.length - 1) / 2 * board.diameter * dirY + ga.currentDy;

    ctx.save();
    ctx.translate(ghostCX, ghostCY);
    ctx.rotate(-rad);

    ctx.globalAlpha = 0.25;
    ctx.fillStyle = '#FFD700';
    roundRect(ctx, -totalLen / 2, -board.diameter / 2, totalLen, board.diameter, 6);
    ctx.fill();
    ctx.strokeStyle = '#FFD700';
    ctx.lineWidth = 1.5;
    ctx.stroke();
    ctx.globalAlpha = 1;

    ctx.restore();
  }

  // Draw orphaned preview escape animations (pig removed from pigs[] immediately, but still animating out)
  for (const a of animations) {
    if (!a.tailIndex) continue; // only preview-mode animations have rendering info stored
    const inst = pigInstances.find(p => p.id === a.pigId);
    if (inst) continue; // pig still in pigs[] — handled by main loop above
    const rad = a.angle * Math.PI / 180;
    const dirX = Math.cos(rad);
    const dirY = -Math.sin(rad);
    const tail = holes[a.tailIndex];
    const totalLen = a.length * board.diameter;
    const cx = tail.x + (a.length - 1) / 2 * board.diameter * dirX + a.currentDx;
    const cy = tail.y + (a.length - 1) / 2 * board.diameter * dirY + a.currentDy;

    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(-rad);

    ctx.globalAlpha = 0.35;
    ctx.fillStyle = '#FFD700';
    roundRect(ctx, -totalLen / 2, -board.diameter / 2, totalLen, board.diameter, 6);
    ctx.fill();
    ctx.globalAlpha = 1;

    ctx.strokeStyle = '#FFD700';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    ctx.restore();
  }

  // Draw selected pig highlight
  if (selectedPigId >= 0 && !dragState) {
    const inst = pigInstances.find(p => p.id === selectedPigId);
    if (inst) {
      const rad = inst.angle * Math.PI / 180;
      const dirX = Math.cos(rad);
      const dirY = -Math.sin(rad);
      const tail = holes[inst.tailIndex];
      const totalLen = inst.length * board.diameter;
      const centerX = tail.x + (inst.length - 1) / 2 * board.diameter * dirX;
      const centerY = tail.y + (inst.length - 1) / 2 * board.diameter * dirY;

      ctx.save();
      ctx.translate(centerX, centerY);
      ctx.rotate(-rad);

      ctx.strokeStyle = '#2196F3';
      ctx.lineWidth = 2;
      ctx.setLineDash([4, 2]);
      ctx.strokeRect(-totalLen / 2 - 2, -board.diameter / 2 - 2, totalLen + 4, board.diameter + 4);
      ctx.setLineDash([]);

      ctx.restore();
    }
  }

  ctx.restore();

  // Bottom drag handle (edit mode)
  if (mode === 'edit') {
    const isDragging = dragState && dragState.type === 'resize';
    ctx.strokeStyle = isDragging ? '#2196F3' : 'rgba(255,255,255,0.25)';
    ctx.lineWidth = isDragging ? 3 : 2;
    const hy = canvas.height - 4;
    ctx.beginPath();
    ctx.moveTo(20, hy);
    ctx.lineTo(canvas.width - 20, hy);
    ctx.stroke();
  }
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.arcTo(x + w, y, x + w, y + r, r);
  ctx.lineTo(x + w, y + h - r);
  ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
  ctx.lineTo(x + r, y + h);
  ctx.arcTo(x, y + h, x, y + h - r, r);
  ctx.lineTo(x, y + r);
  ctx.arcTo(x, y, x + r, y, r);
  ctx.closePath();
}

// ============================================================
// CANVAS MOUSE EVENTS
// ============================================================
function getCanvasPos(e) {
  const canvas = document.getElementById('gameCanvas');
  const rect = canvas.getBoundingClientRect();
  const d = getBoardDerived();
  const scaleX = phoneW / rect.width;
  const scaleY = d.phoneH / rect.height;
  return {
    x: (e.clientX - rect.left) * scaleX,
    y: (e.clientY - rect.top) * scaleY
  };
}

function onCanvasMouseDown(e) {
  const pos = getCanvasPos(e);
  const d = getBoardDerived();

  // Check if dragging the bottom edge to resize height
  if (mode === 'edit' && pos.y >= d.phoneH - 12 && pos.y <= d.phoneH + 4) {
    dragState = { type: 'resize', startY: e.clientY, startRatio: board.heightRatio };
    document.getElementById('gameCanvas').style.cursor = 'ns-resize';
    return;
  }

  if (mode === 'edit') handleEditMouseDown(pos);
  else handlePreviewMouseDown(pos);
}

function onCanvasMouseMove(e) {
  const pos = getCanvasPos(e);

  if (dragState && dragState.type === 'resize') {
    const dy = e.clientY - dragState.startY;
    const d = getBoardDerived();
    const rect = document.getElementById('gameCanvas').getBoundingClientRect();
    const scale = d.phoneH / rect.height;
    const ratioDelta = (dy * scale) / phoneW;
    board.heightRatio = Math.max(0.5, Math.min(5, dragState.startRatio + ratioDelta));
    recomputeBoard();
    return;
  }

  if (dragState) {
    dragState.mouseX = pos.x;
    dragState.mouseY = pos.y;
    const cfg = findBestDragConfig(pos);
    if (cfg) {
      applyDragConfig(cfg);
      if (cfg.inBounds) {
        dragState.lastValid = cfg;
      }
    }
    dragState.currentCfg = cfg;
    render();
  } else if (mode === 'edit') {
    // Hover cursor: ns-resize near bottom edge, crosshair elsewhere
    const d = getBoardDerived();
    const canvas = document.getElementById('gameCanvas');
    if (pos.y >= d.phoneH - 12 && pos.y <= d.phoneH + 4) {
      canvas.style.cursor = 'ns-resize';
    } else {
      canvas.style.cursor = 'crosshair';
    }
  }
}

function onCanvasMouseUp(e) {
  if (dragState && dragState.type === 'resize') {
    dragState = null;
    document.getElementById('gameCanvas').style.cursor = '';
    markCurrentDirty();
    render();
    return;
  }
  if (dragState && dragState.previewMode) {
    handlePreviewMouseUp(getCanvasPos(e));
  } else if (mode === 'edit' && dragState) {
    handleEditMouseUp(getCanvasPos(e));
  }
}

/**
 * Find the best valid config for the current mouse position.
 * Tail stays FIXED at dragState.tailIndex — only angle rotates.
 * For reposition: length is also fixed.
 * For new placement: length computed from tail→mouse distance.
 * Returns { tailIndex, length, angle, inBounds } or null if hole collision.
 */
function findBestDragConfig(pos) {
  const offset = getBoardOffset();
  const mx = pos.x - offset.x;
  const my = pos.y - offset.y;
  const excludeId = dragState.repositionPigId;

  // Tail is FIXED — does not move during drag
  const tailIndex = dragState.tailIndex;
  const tail = holes[tailIndex];
  if (!tail) return null;

  // Angle: from fixed tail to mouse position
  const dx = mx - tail.x;
  const dy = my - tail.y;
  let angle = Math.atan2(-dy, dx) * 180 / Math.PI;
  if (angle < 0) angle += 360;
  angle = Math.round(angle);

  // Length: fixed for reposition, distance-based for new placement
  let len;
  if (excludeId !== null) {
    const origPig = pigs.find(p => p.id === excludeId);
    len = origPig ? origPig.length : 2;
  } else {
    const dist = Math.sqrt(dx * dx + dy * dy);
    len = Math.max(2, Math.min(20, Math.floor(dist / board.diameter) + 1));
  }

  // During drag: allow rotation outside board edges, only block actual hole collisions
  const { occupied } = getPigOccupiedHoles(tailIndex, len, angle);
  const excludeIdVal = excludeId !== null ? excludeId : -1;
  const hasCollision = occupied.some(hi => holeOccupiedBy[hi] >= 0 && holeOccupiedBy[hi] !== excludeIdVal);
  if (hasCollision) return null;

  const inBounds = isPlacementValid(tailIndex, len, angle, excludeIdVal).valid;
  return { tailIndex, length: len, angle, inBounds };
}

/**
 * Apply a valid drag config immediately — the pig lands at this position in real time.
 * For reposition: updates the existing pig's angle.
 * For new placement: creates/updates a pending pig in the pigs array.
 */
function applyDragConfig(cfg) {
  if (dragState.repositionPigId !== null) {
    // Repositioning: update existing pig's angle in-place
    const pig = pigs.find(p => p.id === dragState.repositionPigId);
    if (pig) { pig.angle = cfg.angle; }
  } else {
    // New placement: create pending pig on first valid config, update thereafter
    if (dragState.pendingPigId === null) {
      const newPig = { id: -1, tailIndex: cfg.tailIndex, length: cfg.length, angle: cfg.angle };
      pigs.push(newPig);
      dragState.pendingPigId = -1;
    } else {
      const pig = pigs.find(p => p.id === dragState.pendingPigId);
      if (pig) { pig.tailIndex = cfg.tailIndex; pig.length = cfg.length; pig.angle = cfg.angle; }
    }
  }
  rebuildOccupancy();
  updatePigEditor();
}

function handleEditMouseDown(pos) {
  // Check body / head click first (any part of pig = start drag to rotate angle)
  const pigId = getPigAtPoint(pos.x, pos.y);
  if (pigId >= 0) {
    const pig = pigs.find(p => p.id === pigId);
    selectedPigId = pigId;
    // Tail stays FIXED at original hole, only angle rotates with mouse
    dragState = {
      mouseX: pos.x, mouseY: pos.y,
      tailIndex: pig.tailIndex,
      repositionPigId: pigId,
      pendingPigId: null,
      lastValid: { tailIndex: pig.tailIndex, length: pig.length, angle: pig.angle, inBounds: true },
      currentCfg: null
    };
    updatePigEditor();
    render();
    return;
  }

  // Click on empty hole → new pig placement
  const holeIdx = getHoleAtPoint(pos.x, pos.y, 4);
  if (holeIdx >= 0 && holeOccupiedBy[holeIdx] < 0) {
    dragState = {
      mouseX: pos.x, mouseY: pos.y,
      tailIndex: holeIdx,
      repositionPigId: null,
      pendingPigId: null,
      lastValid: null,
      currentCfg: null
    };
    selectedPigId = null;
    updatePigEditor();
    render();
    return;
  }

  // Click on nothing
  selectedPigId = null;
  cancelDrag();
  updatePigEditor();
  render();
}

function handleEditMouseUp(pos) {
  if (!dragState) return;

  const lv = dragState.lastValid;

  if (dragState.repositionPigId !== null) {
    // Repositioning: pig already at current angle (applied in real-time)
    if (lv) {
      const pig = pigs.find(p => p.id === dragState.repositionPigId);
      // Check pig's current position (may be outside board after drag)
      const check = pig ? isPlacementValid(pig.tailIndex, pig.length, pig.angle, pig.id) : { valid: false };
      if (!check.valid) {
        // Pig landed outside → snap back to last in-bounds position
        if (pig) {
          pig.angle = lv.angle;
          rebuildOccupancy();
          updatePigList();
          updatePigEditor();
          showToast('小猪不能停在棋盘外，已回弹');
          // 回弹后继续执行逃脱逻辑
          tryGhostPush(dragState.repositionPigId);
        }
      } else {
        updatePigList();
        updatePigEditor();
        markCurrentDirty();
        showToast(`小猪 #${dragState.repositionPigId} 角度已调整 → ${pig.angle}°`);
        // 落地后尝试逃脱（编辑模式：幽灵猪飞走，真猪留在原地）
        tryGhostPush(dragState.repositionPigId);
      }
    }
  } else if (dragState.pendingPigId !== null && lv) {
    // New placement: check pending pig's current position (may be outside board after drag)
    const pendingPig = pigs.find(p => p.id === dragState.pendingPigId);
    const check = pendingPig ? isPlacementValid(pendingPig.tailIndex, pendingPig.length, pendingPig.angle, -1) : { valid: false };
    if (!check.valid) {
      // Pig placed outside board → snap back or cancel
      pigs = pigs.filter(p => p.id !== dragState.pendingPigId);
      if (dragState.lastValid && dragState.lastValid.inBounds) {
        const slv = dragState.lastValid;
        const pig = { id: nextPigId++, tailIndex: slv.tailIndex, length: slv.length, angle: slv.angle };
        pigs.push(pig);
        rebuildOccupancy();
        selectedPigId = pig.id;
        updatePigEditor();
        updatePigList();
        markCurrentDirty();
        showToast(`小猪 #${pig.id} 已回弹至上一有效位置 (${slv.length}格, ${slv.angle}°)`);
        tryGhostPush(pig.id);
      } else {
        rebuildOccupancy();
        selectedPigId = null;
        updatePigEditor();
        updatePigList();
        showToast('小猪不能停在棋盘外，已取消');
      }
    } else {
      // Remove pending pig, add proper one
      pigs = pigs.filter(p => p.id !== dragState.pendingPigId);
      const pig = { id: nextPigId++, tailIndex: lv.tailIndex, length: lv.length, angle: lv.angle };
      pigs.push(pig);
      rebuildOccupancy();
      selectedPigId = pig.id;
      updatePigEditor();
      updatePigList();
      markCurrentDirty();
      showToast(`小猪 #${pig.id} 已放置 (${lv.length}格, ${lv.angle}°)`);
      // 落地后尝试逃脱（编辑模式：幽灵猪飞走，真猪留在原地）
      tryGhostPush(pig.id);
    }
  } else if (dragState.pendingPigId !== null) {
    // Pending pig created but no valid config — remove it
    pigs = pigs.filter(p => p.id !== dragState.pendingPigId);
    rebuildOccupancy();
  }
  // else: no pending pig, no reposition — nothing to do (user clicked empty hole, never moved to valid)

  dragState = null;
  render();
}

function handlePreviewMouseDown(pos) {
  const pigId = getPigAtPoint(pos.x, pos.y);
  if (pigId >= 0) {
    const pig = pigs.find(p => p.id === pigId);
    // Start drag-to-rotate, same logic as editor
    dragState = {
      mouseX: pos.x, mouseY: pos.y,
      tailIndex: pig.tailIndex,
      repositionPigId: pigId,
      pendingPigId: null,
      lastValid: { tailIndex: pig.tailIndex, length: pig.length, angle: pig.angle, inBounds: true },
      currentCfg: null,
      originalAngle: pig.angle,
      previewMode: true
    };
    document.getElementById('gameCanvas').style.cursor = 'grabbing';
    render();
  }
}

function handlePreviewMouseUp(pos) {
  if (!dragState || !dragState.previewMode) return;

  const pigId = dragState.repositionPigId;
  const pig = pigs.find(p => p.id === pigId);
  if (!pig) { dragState = null; render(); return; }

  // Check if pig landed outside board → snap back
  const check = isPlacementValid(pig.tailIndex, pig.length, pig.angle, pigId);
  if (!check.valid) {
    if (dragState.lastValid && dragState.lastValid.inBounds) {
      pig.angle = dragState.lastValid.angle;
      rebuildOccupancy();
      showToast('小猪不能停在棋盘外，已回弹');
    } else {
      pig.angle = dragState.originalAngle;
      rebuildOccupancy();
      showToast('小猪不能停在棋盘外，已回弹');
    }
    // After snap-back, continue to escape logic (no return)
  }

  // 先落地：当前角度已确认，不再回退
  // 再执行逃脱逻辑
  const result = canPushPig(pigId);
  if (!result.canPush) {
    // 碰撞 → 猪留在落地位置，被碰猪闪烁
    if (result.collidedPigId !== undefined) {
      flashingPigs[result.collidedPigId] = performance.now();
      showToast(`碰到了猪 #${result.collidedPigId}!`);
    } else {
      showToast(result.reason);
    }
  } else {
    // Clear path → animate escape
    showToast(`猪 #${pigId} 被推出!`);

    const anim = {
      pigId,
      dirX: result.dirX,
      dirY: result.dirY,
      totalDist: result.totalDist,
      currentDx: 0,
      currentDy: 0,
      startTime: performance.now(),
      duration: 4800,
      // Store rendering info so pig can be drawn even after removal from pigs[]
      tailIndex: pig.tailIndex,
      length: pig.length,
      angle: pig.angle
    };
    animations.push(anim);

    // Immediately release grid cells (don't wait for animation to finish)
    pigs = pigs.filter(p => p.id !== pigId);
    rebuildOccupancy();
    updatePigList();

    setTimeout(() => {
      animations = animations.filter(a => a.pigId !== pigId);
      render();
    }, anim.duration + 50);
  }

  dragState = null;
  document.getElementById('gameCanvas').style.cursor = 'pointer';
  render();
}

// ============================================================
// PUSH MECHANIC (preview mode)
// ============================================================
function canPushPig(pigId) {
  const inst = pigInstances.find(p => p.id === pigId);
  if (!inst) return { canPush: false, reason: '猪不存在' };

  const rad = inst.angle * Math.PI / 180;
  const dirX = Math.cos(rad);
  const dirY = -Math.sin(rad);
  const stepSize = board.diameter;

  // Try up to a large number of steps (off-screen)
  const d = getBoardDerived();
  const maxSteps = Math.ceil(Math.max(phoneW, d.phoneH) / stepSize) + inst.length;
  for (let step = 1; step <= maxSteps; step++) {
    for (const cell of inst.cells) {
      const nx = cell.x + step * stepSize * dirX;
      const ny = cell.y + step * stepSize * dirY;
      for (let hi = 0; hi < holes.length; hi++) {
        if (holeOccupiedBy[hi] >= 0 && holeOccupiedBy[hi] !== pigId) {
          if (cellOverlapsHole(nx, ny, holes[hi].x, holes[hi].y)) {
            return { canPush: false, reason: `推进中会碰到猪 #${holeOccupiedBy[hi]}`, collidedPigId: holeOccupiedBy[hi] };
          }
        }
      }
    }
  }

  const totalDist = maxSteps * stepSize;
  return { canPush: true, dirX, dirY, totalDist };
}

function tryGhostPush(pigId) {
  const result = canPushPig(pigId);
  if (result.canPush) {
    // Ghost slides out — real pig stays
    ghostAnimations.push({
      pigId,
      dirX: result.dirX,
      dirY: result.dirY,
      totalDist: result.totalDist,
      currentDx: 0,
      currentDy: 0,
      startTime: performance.now(),
      duration: 4800
    });
    // Clean up ghost after animation
    setTimeout(() => {
      ghostAnimations = ghostAnimations.filter(g => g.pigId !== pigId);
      render();
    }, 4850);
  } else if (result.collidedPigId !== undefined) {
    flashingPigs[result.collidedPigId] = performance.now();
    showToast(`碰到了猪 #${result.collidedPigId}!`);
  }
}

function tryPushPig(pigId) {
  const result = canPushPig(pigId);
  if (!result.canPush) {
    // Flash the collided pig
    if (result.collidedPigId !== undefined) {
      flashingPigs[result.collidedPigId] = performance.now();
      showToast(`碰到了猪 #${result.collidedPigId}!`);
    } else {
      showToast(result.reason);
    }
    render();
    return;
  }

  showToast(`猪 #${pigId} 被推出!`);

  // Start animation
  const anim = {
    pigId,
    dirX: result.dirX,
    dirY: result.dirY,
    totalDist: result.totalDist,
    currentDx: 0,
    currentDy: 0,
    startTime: performance.now(),
    duration: 4800
  };
  animations.push(anim);

  // Remove pig after animation
  setTimeout(() => {
    pigs = pigs.filter(p => p.id !== pigId);
    rebuildOccupancy();
    updatePigList();
    animations = animations.filter(a => a.pigId !== pigId);
    render();
  }, anim.duration + 50);
}

function updateAnimations() {
  const now = performance.now();
  for (const anim of animations) {
    const elapsed = now - anim.startTime;
    const progress = Math.min(1, elapsed / anim.duration);
    const eased = 1 - Math.pow(1 - progress, 3); // ease out
    anim.currentDx = anim.dirX * anim.totalDist * eased;
    anim.currentDy = anim.dirY * anim.totalDist * eased;
  }
}

function updateGhostAnimations() {
  const now = performance.now();
  for (const ga of ghostAnimations) {
    const elapsed = now - ga.startTime;
    const progress = Math.min(1, elapsed / ga.duration);
    const eased = 1 - Math.pow(1 - progress, 3); // ease out
    ga.currentDx = ga.dirX * ga.totalDist * eased;
    ga.currentDy = ga.dirY * ga.totalDist * eased;
  }
}

// ============================================================
// PIG EDITOR (right panel)
// ============================================================
function updatePigEditor() {
  const editor = document.getElementById('pigEditor');
  const info = document.getElementById('pigEditorInfo');
  if (selectedPigId >= 0) {
    const pig = pigs.find(p => p.id === selectedPigId);
    if (pig) {
      const inst = pigInstances.find(i => i.id === pig.id);
      const holeCount = inst ? inst.occupiedHoles.length : 0;
      editor.style.display = 'block';
      info.innerHTML = `编号: #${pig.id}<br>长度: ${pig.length} 格<br>角度: ${Math.round(pig.angle)}°<br>占用: ${holeCount} 个孔<br>尾部孔: #${pig.tailIndex}`;
      return;
    }
  }
  editor.style.display = 'none';
}

function deleteSelectedPig() {
  if (selectedPigId < 0) return;
  pigs = pigs.filter(p => p.id !== selectedPigId);
  selectedPigId = null;
  rebuildOccupancy();
  updatePigEditor();
  updatePigList();
  markCurrentDirty();
  render();
}

function updatePigList() {
  // Pig list display removed
}

function selectPig(id) {
  cancelDrag();
  selectedPigId = id;
  updatePigEditor();
  updatePigList();
  render();
}

/**
 * Cancel any ongoing drag — removes pending pig and resets dragState.
 */
function cancelDrag() {
  if (!dragState) return;

  if (dragState.type === 'resize') {
    dragState = null;
    document.getElementById('gameCanvas').style.cursor = '';
    return;
  }

  if (dragState.pendingPigId !== null) {
    pigs = pigs.filter(p => p.id !== dragState.pendingPigId);
    rebuildOccupancy();
  }
  // Restore original angle for preview mode drag (e.g. mouseleave, Escape)
  if (dragState.previewMode) {
    const pig = pigs.find(p => p.id === dragState.repositionPigId);
    if (pig && dragState.originalAngle !== undefined) {
      pig.angle = dragState.originalAngle;
      rebuildOccupancy();
    }
    document.getElementById('gameCanvas').style.cursor = 'pointer';
  }
  dragState = null;
}

// ============================================================
// MODE TOGGLE
// ============================================================
function toggleMode() {
  if (mode === 'edit') {
    mode = 'preview';
    backupPigs = JSON.parse(JSON.stringify(pigs));
    document.getElementById('btnMode').textContent = '返回编辑';
    document.getElementById('btnMode').classList.remove('accent');
    document.getElementById('btnMode').classList.add('danger');
    document.getElementById('modeLabel').textContent = '预览模式';
    document.getElementById('modeLabel').className = 'mode-label preview';
    document.getElementById('canvasHint').textContent = '按住小猪拖拽旋转 | 松手推出';
    selectedPigId = null;
    cancelDrag();
    updatePigEditor();
    document.getElementById('gameCanvas').style.cursor = 'pointer';
  } else {
    mode = 'edit';
    pigs = backupPigs || [];
    backupPigs = null;
    animations = [];
    flashingPigs = {};
    rebuildOccupancy();
    updatePigList();
    document.getElementById('btnMode').textContent = '关卡试玩';
    document.getElementById('btnMode').classList.remove('danger');
    document.getElementById('btnMode').classList.add('accent');
    document.getElementById('modeLabel').textContent = '编辑模式';
    document.getElementById('modeLabel').className = 'mode-label edit';
    document.getElementById('canvasHint').textContent = '点击空圆洞放置小猪 | 拖拽头部可调整';
    document.getElementById('gameCanvas').style.cursor = 'crosshair';
  }
  render();
}

// ============================================================
// BOARD PARAMS UPDATE
// ============================================================
function recomputeBoard() {
  const d = getBoardDerived();
  board.diameter = d.diameter;
  board.hSpacing = d.hSpacing;
  board.vSpacing = d.vSpacing;

  computeHoles();
  rebuildOccupancy();
  recomputeBoardUi();
  resizeCanvas();
  updatePigList();
  render();
  markCurrentDirty();
}

function recomputeBoardUi() {
  document.getElementById('colsVal').textContent = board.cols;
  document.getElementById('rowsVal').textContent = board.rows;
  document.getElementById('gapRatioVal').textContent = board.cellGapRatio.toFixed(1);
  document.getElementById('diameterVal').textContent = board.diameter;
  const d = getBoardDerived();
  document.getElementById('boardSizeVal').textContent = phoneW + '×' + d.phoneH + 'px';
}

function adjCols(delta) {
  board.cols = Math.max(2, Math.min(20, board.cols + delta));
  recomputeBoard();
}

function adjRows(delta) {
  board.rows = Math.max(2, Math.min(25, board.rows + delta));
  recomputeBoard();
}

function adjGapRatio(delta) {
  board.cellGapRatio = Math.round((board.cellGapRatio + delta) * 10) / 10;
  board.cellGapRatio = Math.max(0.5, Math.min(5, board.cellGapRatio));
  recomputeBoard();
}

function resizeCanvas() {
  const d = getBoardDerived();
  const canvas = document.getElementById('gameCanvas');
  canvas.width = phoneW;
  canvas.height = d.phoneH;
  const frame = document.getElementById('phoneFrame');
  const panelWidth = 220 + 220 + 48;
  const maxW = Math.min(phoneW, window.innerWidth - panelWidth);
  const maxH = window.innerHeight - 120;
  const scale = Math.max(0.4, Math.min(maxW / phoneW, maxH / d.phoneH));
  canvas.style.width = (phoneW * scale) + 'px';
  canvas.style.height = (d.phoneH * scale) + 'px';
  frame.style.width = (phoneW * scale) + 'px';
  frame.style.height = (d.phoneH * scale) + 'px';
}

// ============================================================
// FILE SYSTEM ACCESS API HELPERS
// ============================================================
const IDB_NAME = 'pigEditorFS';
const IDB_VERSION = 1;

function idbOpen() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(IDB_NAME, IDB_VERSION);
    req.onupgradeneeded = () => { req.result.createObjectStore('handles'); };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function persistPublishHandle(handle) {
  const db = await idbOpen();
  return new Promise((resolve, reject) => {
    const tx = db.transaction('handles', 'readwrite');
    tx.objectStore('handles').put(handle, 'publishDir');
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  });
}

async function persistLevelsDirHandle(handle) {
  const db = await idbOpen();
  return new Promise((resolve, reject) => {
    const tx = db.transaction('handles', 'readwrite');
    tx.objectStore('handles').put(handle, 'levelsDir');
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  });
}

async function restoreLevelsDirHandle() {
  try {
    const db = await idbOpen();
    return new Promise((resolve, reject) => {
      const tx = db.transaction('handles', 'readonly');
      const req = tx.objectStore('handles').get('levelsDir');
      req.onsuccess = async () => {
        const handle = req.result;
        if (handle) {
          const opts = { mode: 'readwrite' };
          const ok = await handle.queryPermission(opts) === 'granted';
          resolve(ok ? handle : null);
        } else {
          resolve(null);
        }
      };
      req.onerror = () => resolve(null);
    });
  } catch (e) {
    return null;
  }
}

async function restorePublishHandle() {
  try {
    const db = await idbOpen();
    return new Promise((resolve, reject) => {
      const tx = db.transaction('handles', 'readonly');
      const req = tx.objectStore('handles').get('publishDir');
      req.onsuccess = async () => {
        const handle = req.result;
        if (handle) {
          const opts = { mode: 'readwrite' };
          const ok = await handle.queryPermission(opts) === 'granted';
          resolve(ok ? handle : null);
        } else {
          resolve(null);
        }
      };
      req.onerror = () => resolve(null);
    });
  } catch (e) {
    return null;
  }
}

async function writeFileToHandle(fileHandle, content) {
  const writable = await fileHandle.createWritable();
  await writable.write(content);
  await writable.close();
}

async function scanDefaultLevels() {
  try {
    const resp = await fetch('/list-levels');
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const entries = await resp.json();
    return entries.map(e => ({
      name: e.name,
      fileName: e.fileName,
      data: e.data,
      fileHandle: null,
      isDirty: false
    }));
  } catch (e) {
    console.log('scanDefaultLevels failed:', e.message);
    return [];
  }
}

async function getNextLevelNumber() {
  let maxNum = 0;
  for (const lv of levelList) {
    const m = lv.name.match(/^level_(\d{4})$/);
    if (m) maxNum = Math.max(maxNum, parseInt(m[1]));
  }
  return maxNum + 1;
}

function pad4(n) { return String(n).padStart(4, '0'); }

// ============================================================
// LEVEL DATA HELPERS
// ============================================================
function getLevelData() {
  return {
    board: { cols: board.cols, rows: board.rows, heightRatio: board.heightRatio, cellGapRatio: board.cellGapRatio },
    pigs: pigs.map(p => ({ id: p.id, tail: p.tailIndex, length: p.length, angle: p.angle }))
  };
}

function loadLevelData(data) {
  if (data.board) {
    board.cols = data.board.cols || 3;
    board.rows = data.board.rows || 5;
    board.heightRatio = data.board.heightRatio || 1.2;
    board.cellGapRatio = data.board.cellGapRatio || 1.5;
  }
  pigs = (data.pigs || []).map(p => ({ id: p.id, tailIndex: p.tail, length: p.length, angle: p.angle }));
  nextPigId = pigs.length > 0 ? Math.max(...pigs.map(p => p.id)) + 1 : 0;
  selectedPigId = null;
  if (dragState && dragState.pendingPigId !== null) {
    pigs = pigs.filter(p => p.id !== dragState.pendingPigId);
  }
  dragState = null;
  flashingPigs = {};

  computeHoles();
  rebuildOccupancy();
  updatePigEditor();
  updatePigList();
  recomputeBoardUi();
  resizeCanvas();
  render();
}

function saveCurrentToEntry() {
  if (currentLevelIdx >= 0 && currentLevelIdx < levelList.length) {
    levelList[currentLevelIdx].data = getLevelData();
    levelList[currentLevelIdx].isDirty = true;
  }
}

function markCurrentDirty() {
  if (currentLevelIdx >= 0 && currentLevelIdx < levelList.length) {
    levelList[currentLevelIdx].isDirty = true;
    updateLevelListUI();
  }
}

// Auto-save when switching/leaving a level (sync data in memory)
async function autoSaveCurrent() {
  if (currentLevelIdx < 0 || currentLevelIdx >= levelList.length) return;
  const entry = levelList[currentLevelIdx];
  entry.data = getLevelData();
  entry.isDirty = false;
  updateLevelListUI();
}

// ============================================================
// LEVEL LIST UI
// ============================================================
function updateLevelListUI() {
  const container = document.getElementById('levelListContainer');
  if (levelList.length === 0) {
    container.innerHTML = '<div style="font-size:11px;color:#999;padding:4px 8px;">暂无关卡</div>';
  } else {
    container.innerHTML = levelList.map((lv, i) => {
      const active = i === currentLevelIdx ? ' active' : '';
      const dirty = lv.isDirty ? ' <span class="lv-dirty">*</span>' : '';
      const fileInfo = lv.fileName ? lv.fileName : '未保存';
      return `<div class="level-item${active}" onclick="switchToLevel(${i})" title="${lv.name} — ${fileInfo}">
        <span class="lv-name" onclick="event.stopPropagation();renameLevel(${i})" title="点击改名">${lv.name}${dirty}</span>
        <button class="lv-save" onclick="event.stopPropagation();saveLevel()" title="保存当前关卡草稿">存草稿</button>
        <button class="lv-publish" onclick="event.stopPropagation();publishLevel(${i})" title="发布到游戏关卡目录">发布</button>
      </div>`;
    }).join('');
  }
  container.innerHTML += '<div class="lv-add" onclick="newLevel()" title="新建空白关卡">+</div>';
}

async function switchToLevel(idx) {
  if (idx === currentLevelIdx) return;
  if (idx < 0 || idx >= levelList.length) return;
  await autoSaveCurrent();
  currentLevelIdx = idx;
  const entry = levelList[idx];
  loadLevelData(entry.data);
  updateLevelListUI();
}

async function addLevelToList(name, fileName, data, fileHandle) {
  await autoSaveCurrent();
  const entry = { name, fileName: fileName || null, data: data || getDefaultLevelData(), fileHandle: fileHandle || null, isDirty: false };
  levelList.push(entry);
  currentLevelIdx = levelList.length - 1;
  loadLevelData(entry.data);
  updateLevelListUI();
  return entry;
}

function getDefaultLevelData() {
  return {
    board: { cols: 3, rows: 5, heightRatio: 1.2, cellGapRatio: 1.5 },
    pigs: []
  };
}

// ============================================================
// NEW LEVEL
// ============================================================
async function newLevel() {
  await autoSaveCurrent();
  // Find next level number from existing list
  let maxNum = 0;
  for (const lv of levelList) {
    const m = lv.name.match(/^level_(\d{4})$/);
    if (m) maxNum = Math.max(maxNum, parseInt(m[1]));
  }
  const autoName = 'level_' + pad4(maxNum + 1);
  addLevelToList(autoName, null, getDefaultLevelData(), null);
  showToast('已创建: ' + autoName);
}

// ============================================================
// SAVE LEVEL (download JSON file)
// ============================================================
async function saveLevel() {
  if (currentLevelIdx < 0) { showToast('没有可保存的关卡'); return; }
  const entry = levelList[currentLevelIdx];

  // Sync current state into entry
  entry.data = getLevelData();
  entry.isDirty = false;

  let fileName = entry.fileName;
  if (!fileName) {
    // Generate new file name
    const num = await getNextLevelNumber();
    fileName = 'level_' + pad4(num) + '.json';
    entry.fileName = fileName;
    entry.name = 'level_' + pad4(num);
  }

  const json = JSON.stringify(entry.data, null, 2);
  try {
    const resp = await fetch('/save-level?name=' + encodeURIComponent(fileName), {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: json
    });
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    updateLevelListUI();
    showToast('已保存: ' + fileName + ' → levels/');
  } catch (e) {
    showToast('保存失败: ' + e.message);
  }
}

// ============================================================
// RENAME LEVEL
// ============================================================
async function renameLevel(idx) {
  if (idx < 0 || idx >= levelList.length) return;
  const entry = levelList[idx];

  const input = prompt('输入新编号（纯数字，如 "3"）：');
  if (input === null || input.trim() === '') return;

  const num = parseInt(input.trim(), 10);
  if (isNaN(num) || num <= 0) {
    showToast('请输入有效的正整数');
    return;
  }

  const newName = 'level_' + pad4(num);
  const newFileName = newName + '.json';

  // Check for duplicates
  if (levelList.some((lv, i) => i !== idx && lv.fileName === newFileName)) {
    showToast('文件名重复: ' + newFileName);
    return;
  }

  // Rename file on disk if it exists
  if (entry.fileName) {
    try {
      const resp = await fetch('/rename-level?old=' + encodeURIComponent(entry.fileName) + '&new=' + encodeURIComponent(newFileName));
      if (!resp.ok) {
        // If source doesn't exist yet (never saved), just update the planned name
        if (resp.status !== 404) throw new Error('HTTP ' + resp.status);
      }
    } catch (e) {
      showToast('文件重命名失败: ' + e.message);
      return;
    }
  }

  entry.name = newName;
  entry.fileName = newFileName;
  entry.isDirty = true;
  updateLevelListUI();
  showToast('已改名为: ' + newName);
}

// ============================================================
// LOAD LEVEL (from file picker)
// ============================================================
async function refreshLevelList() {
  await autoSaveCurrent();
  const oldLen = levelList.length;
  levelList = [];
  currentLevelIdx = -1;

  // Re-scan levels/ directory via fetch
  try {
    const defaultLevels = await scanDefaultLevels();
    levelList = defaultLevels;
    if (levelList.length > 0) {
      currentLevelIdx = 0;
      loadLevelData(levelList[0].data);
    }
  } catch (e) {
    console.log('Refresh scan error:', e);
  }

  if (levelList.length === 0) {
    addLevelToList('level_0001', null, getDefaultLevelData(), null);
  }
  updateLevelListUI();
  showToast('关卡列表已刷新（' + levelList.length + ' 个关卡）');
}

function downloadJSON(data, fileName) {
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = fileName;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 100);
}

// ============================================================
// PUBLISH LEVEL to game directory
// ============================================================
async function publishLevel(idx) {
  if (idx < 0 || idx >= levelList.length) return;
  const entry = levelList[idx];

  // Ensure data is current if this is the active level
  if (idx === currentLevelIdx) {
    entry.data = getLevelData();
  }

  // Validate: level must contain pigs
  const pigCount = (entry.data && entry.data.pigs) ? entry.data.pigs.length : 0;
  if (pigCount === 0) {
    showToast('发布失败：关卡内没有小猪');
    return;
  }

  // Get or request publish directory handle
  if (!publishDirHandle) {
    try {
      const pickerOpts = { id: 'pig-editor-publish', mode: 'readwrite' };
      const handle = await window.showDirectoryPicker(pickerOpts);
      publishDirHandle = handle;
      await persistPublishHandle(handle);
    } catch (e) {
      if (e.name === 'AbortError') return;
      showToast('选择目录失败: ' + e.message);
      return;
    }
  }

  // Determine file name: use existing fileName or generate from name
  let fileName;
  if (entry.fileName) {
    fileName = entry.fileName;
  } else {
    // Generate from level name (sanitize)
    fileName = entry.name.replace(/[^a-zA-Z0-9\u4e00-\u9fa5_-]/g, '_') + '.json';
  }

  try {
    const json = JSON.stringify(entry.data, null, 2);
    const fileHandle = await publishDirHandle.getFileHandle(fileName, { create: true });
    await writeFileToHandle(fileHandle, json);
    showToast('已发布: ' + fileName + ' → 游戏关卡目录');
  } catch (e) {
    showToast('发布失败: ' + e.message);
    console.error(e);
  }
}

// ============================================================
// PUBLISH ALL LEVELS
// ============================================================
// ============================================================
// KEYBOARD SHORTCUTS
// ============================================================
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    if (dragState && dragState.previewMode) {
      cancelDrag();
      render();
      e.preventDefault();
      return;
    }
    if (mode !== 'edit') return;
    selectedPigId = null;
    cancelDrag();
    updatePigEditor();
    updatePigList();
    render();
    e.preventDefault();
  }
  if (mode !== 'edit') return;
  if (e.key === 'Delete' || e.key === 'Backspace') {
    if (selectedPigId >= 0 && document.activeElement === document.body) {
      deleteSelectedPig();
      e.preventDefault();
    }
  }
});

// ============================================================
// DRAG & DROP JSON IMPORT
// ============================================================
document.addEventListener('dragover', e => { e.preventDefault(); });
document.addEventListener('drop', e => {
  e.preventDefault();
  const file = e.dataTransfer.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const data = JSON.parse(reader.result);
      if (!data.board || !Array.isArray(data.pigs)) { showToast('无效的关卡文件格式'); return; }
      const fileName = file.name;
      const levelName = fileName.replace(/\.json$/i, '');
      // Check duplicates
      if (levelList.some(l => l.fileName === fileName)) {
        showToast('关卡文件已存在: ' + fileName);
        return;
      }
      if (levelList.some(l => l.name === levelName)) {
        if (!confirm(`关卡 "${levelName}" 已在列表中（来自不同文件）。\n是否替换？`)) return;
        const idx = levelList.findIndex(l => l.name === levelName);
        levelList[idx].data = data;
        levelList[idx].fileName = fileName;
        levelList[idx].isDirty = false;
        switchToLevel(idx);
        showToast('已替换: ' + fileName);
        return;
      }
      addLevelToList(levelName, fileName, data, null);
      showToast('已导入: ' + fileName);
    } catch (err) {
      showToast('JSON 解析失败');
    }
  };
  reader.readAsText(file);
});

// ============================================================
// TOAST
// ============================================================
let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2000);
}

// ============================================================
// INIT
// ============================================================
async function init() {

  const canvas = document.getElementById('gameCanvas');
  canvas.addEventListener('mousedown', onCanvasMouseDown);
  canvas.addEventListener('mousemove', onCanvasMouseMove);
  canvas.addEventListener('mouseup', (e) => {
    onCanvasMouseUp(e);
    e.stopPropagation(); // prevent document handler from double-firing
  });
  canvas.addEventListener('mouseleave', () => {
    if (dragState) { cancelDrag(); render(); }
  });

  // Catch mouseup outside canvas (e.g. mouse released outside browser viewport)
  document.addEventListener('mouseup', (e) => {
    if (!dragState) return;
    if (dragState.previewMode) {
      handlePreviewMouseUp(null);
    } else if (mode === 'edit') {
      handleEditMouseUp(null);
    }
  });

  // Catch mousemove outside canvas for resize drag (bottom edge goes outside canvas)
  document.addEventListener('mousemove', (e) => {
    if (!dragState) return;
    onCanvasMouseMove(e);
  });

  recomputeBoard();
  updateLevelListUI();

  // Auto-scan levels directory via fetch on startup
  try {
    const defaultLevels = await scanDefaultLevels();
    if (defaultLevels.length > 0) {
      levelList = defaultLevels;
      currentLevelIdx = 0;
      loadLevelData(levelList[0].data);
      updateLevelListUI();
    }
  } catch (e) {
    console.log('Level scan skipped:', e.message);
  }

  // Restore publish directory handle
  publishDirHandle = await restorePublishHandle();

  // If no levels at all, create a default one
  if (levelList.length === 0) {
    addLevelToList('level_0001', null, getDefaultLevelData(), null);
  }

  // Animation loop
  function loop() {
    if (animations.length > 0 || ghostAnimations.length > 0 || Object.keys(flashingPigs).length > 0) {
      if (animations.length > 0) updateAnimations();
      if (ghostAnimations.length > 0) updateGhostAnimations();
      // Clean up expired flashes
      const now = performance.now();
      for (const [pid, start] of Object.entries(flashingPigs)) {
        if (now - start > 500) delete flashingPigs[pid];
      }
      render();
    }
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
}

window.addEventListener('resize', resizeCanvas);
init();
